{% extends "base.html" %}

{% block title %}
Edit Doctor
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-warning text-dark">

            <h3>Edit Doctor</h3>

        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Full Name
                    </label>

                    <input
                        type="text"
                        name="full_name"
                        class="form-control"
                        value="{{ doctor.full_name }}"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Specialization
                    </label>

                    <input
                        type="text"
                        name="specialization"
                        class="form-control"
                        value="{{ doctor.specialization }}"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Qualification
                    </label>

                    <input
                        type="text"
                        name="qualification"
                        class="form-control"
                        value="{{ doctor.qualification }}"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Experience
                    </label>

                    <input
                        type="number"
                        name="experience"
                        class="form-control"
                        value="{{ doctor.experience }}"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Phone
                    </label>

                    <input
                        type="text"
                        name="phone"
                        class="form-control"
                        value="{{ doctor.phone }}"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn btn-warning">

                    Update Doctor

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
