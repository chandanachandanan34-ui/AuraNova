{% extends "base.html" %}


{% block title %}
Book Appointment
{% endblock %}



{% block content %}


<div class="card shadow mt-5">


<div class="card-header bg-primary text-white">

<h3>
Book Appointment
</h3>

</div>



<div class="card-body">


<h5>
Doctor:
Dr. {{ doctor.full_name }}
</h5>


<p>
{{ doctor.specialization }}
</p>



<form method="POST">


<div class="mb-3">

<label class="form-label">
Appointment Date
</label>


<input 
type="date"
name="date"
class="form-control"
required>

</div>



<div class="mb-3">

<label class="form-label">
Appointment Time
</label>


<input 
type="time"
name="time"
class="form-control"
required>

</div>



<div class="mb-3">

<label class="form-label">
Reason
</label>


<textarea
name="reason"
class="form-control"
required></textarea>


</div>



<button class="btn btn-success">

Book Appointment

</button>



</form>


</div>


</div>


{% endblock %}
