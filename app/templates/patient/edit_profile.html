{% extends "base.html" %}

{% block title %}
Edit Profile
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-header bg-warning text-dark">

                    <h3 class="mb-0">
                        Edit Profile
                    </h3>

                </div>

                <div class="card-body">

                    <form method="POST">

                        <div class="row">
                    
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Full Name</label>
                                <input
                                    type="text"
                                    name="full_name"
                                    class="form-control"
                                    value="{{ current_user.full_name }}"
                                    required>
                            </div>
                    
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email</label>
                                <input
                                    type="email"
                                    name="email"
                                    class="form-control"
                                    value="{{ current_user.email }}"
                                    required>
                            </div>
                    
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Phone</label>
                                <input
                                    type="text"
                                    name="phone"
                                    class="form-control"
                                    value="{{ current_user.phone or '' }}">
                            </div>
                    
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Gender</label>
                    
                                <select
                                    name="gender"
                                    class="form-select">
                    
                                    <option value="">Select Gender</option>
                    
                                    <option value="Male"
                                        {% if current_user.gender=="Male" %}selected{% endif %}>
                                        Male
                                    </option>
                    
                                    <option value="Female"
                                        {% if current_user.gender=="Female" %}selected{% endif %}>
                                        Female
                                    </option>
                    
                                    <option value="Other"
                                        {% if current_user.gender=="Other" %}selected{% endif %}>
                                        Other
                                    </option>
                    
                                </select>
                            </div>
                    
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Blood Group</label>
                    
                                <select
                                    name="blood_group"
                                    class="form-select">
                    
                                    <option value="">Select Blood Group</option>
                    
                                    {% for bg in ['A+','A-','B+','B-','AB+','AB-','O+','O-'] %}
                    
                                        <option value="{{ bg }}"
                                        {% if current_user.blood_group==bg %}selected{% endif %}>
                                            {{ bg }}
                                        </option>
                    
                                    {% endfor %}
                    
                                </select>
                            </div>
                    
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Date of Birth</label>
                    
                                <input
                                    type="date"
                                    name="date_of_birth"
                                    class="form-control"
                                    value="{{ current_user.date_of_birth }}">
                            </div>
                    
                            <div class="col-12 mb-3">
                                <label class="form-label">Address</label>
                    
                                <textarea
                                    name="address"
                                    class="form-control"
                                    rows="3">{{ current_user.address or '' }}</textarea>
                            </div>
                    
                        </div>
                    
                        <button
                            type="submit"
                            class="btn btn-success">
                    
                            💾 Save Changes
                    
                        </button>
                    
                        <a
                            href="{{ url_for('patient.profile') }}"
                            class="btn btn-secondary">
                    
                            Cancel
                    
                        </a>
                    
                    </form>
                              

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
