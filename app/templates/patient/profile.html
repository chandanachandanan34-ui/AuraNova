{% extends "base.html" %}


{% block title %}
My Profile
{% endblock %}


{% block content %}


<div class="container mt-5">


    <div class="card shadow">


        <div class="card-header bg-primary text-white">

            <h3>
                Patient Profile
            </h3>

        </div>



        <div class="card-body">


            <div class="mb-3">

                <strong>Name:</strong>

                {{ user.full_name }}

            </div>



            <div class="mb-3">

                <strong>Email:</strong>

                {{ user.email }}

            </div>



            <div class="mb-3">

                <strong>Role:</strong>

                {{ user.role }}

            </div>


        </div>


    </div>


</div>


{% endblock %}
