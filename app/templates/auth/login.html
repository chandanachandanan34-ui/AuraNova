{% extends "base.html" %}

{% block title %}
Login - AuraNova
{% endblock %}

{% block content %}

<div class="container mt-5" style="max-width:500px;">

    <h2 class="text-center mb-4">
        Login to AuraNova
    </h2>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">
                Email Address
            </label>

            <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Enter your email"
                required
            >
        </div>

        <div class="mb-3">
            <label class="form-label">
                Password
            </label>

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter password"
                required
            >
        </div>

        <button
            type="submit"
            class="btn btn-primary w-100">
            Login
        </button>

    </form>

</div>

{% endblock %}
